name: E2E Tests

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string
    secrets:
      TURBO_TOKEN:
        required: false
      TURBO_TEAM:
        required: false

permissions: {}

jobs:
  e2e-monorepo:
    name: E2E monorepo
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "./packages/core" --filter "./packages/cli" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/monorepo
        run: pnpm install

      - name: Test
        working-directory: ./e2e-tests/monorepo
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'

  e2e-no-bundling:
    name: E2E no-bundling
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "@mastra/core" --filter "@mastra/evals" --filter "@mastra/libsql" --filter "@mastra/loggers" --filter "@mastra/memory" --filter "@mastra/observability" --filter "mastra" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/no-bundling
        run: pnpm install

      - name: Test
        working-directory: ./e2e-tests/no-bundling
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'

  e2e-create-mastra:
    name: E2E create-mastra
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "create-mastra" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/create-mastra
        run: pnpm install

      - name: Test
        working-directory: ./e2e-tests/create-mastra
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'

  e2e-commonjs:
    name: E2E CommonJS
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "@mastra/core" --filter "@mastra/loggers" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/commonjs
        run: pnpm install

      - name: Test
        working-directory: ./e2e-tests/commonjs
        run: pnpm test

  e2e-deployers:
    name: E2E deployers
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/deployers
        run: pnpm install

      - name: Test
        working-directory: ./e2e-tests/deployers
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'

  e2e-type-check:
    name: E2E Type check
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

      - name: Install e2e test type-check
        working-directory: ./e2e-tests/type-check
        run: pnpm install

      - name: Test
        working-directory: ./e2e-tests/type-check
        run: pnpm test

  e2e-kitchen-sink:
    name: E2E kitchen-sink (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

      - name: Setup e2e project dependencies
        working-directory: ./packages/playground
        run: pnpm test:e2e:setup

      - name: Test E2E
        working-directory: ./packages/playground
        run: pnpm exec playwright test -c e2e/playwright.config.ts --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  e2e-client-js:
    name: E2E client-js (optional)
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

      - name: Test client-js zod-v3
        run: pnpm --filter "client-js-e2e-tests-zod-v3" test

      - name: Test client-js zod-v4
        run: pnpm --filter "client-js-e2e-tests-zod-v4" test
