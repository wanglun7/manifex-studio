name: PR Triage

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - edited
      - synchronize
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  issue-link-nudge:
    if: ${{ github.repository == 'mastra-ai/mastra' && github.event_name == 'pull_request_target' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      needs_issue: ${{ steps.issue_link.outputs.needs_issue }}
      summary: ${{ steps.issue_link.outputs.summary }}
    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions
            scripts/pr-issue-link
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}

      - name: Setup pnpm and node
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: false
          package-manager-cache: false
          version: '10'

      - name: Install dependencies
        run: pnpm install --ignore-workspace --ignore-scripts
        working-directory: scripts/pr-issue-link

      - name: Enforce linked issue
        id: issue_link
        run: npx tsx index.ts
        working-directory: scripts/pr-issue-link
        env:
          MODE: nudge
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STALE_DAYS: ${{ vars.PR_NEEDS_ISSUE_STALE_DAYS || '1' }}

  complexity:
    needs: issue-link-nudge
    if: ${{ needs['issue-link-nudge'].outputs.needs_issue == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      summary: ${{ steps.complexity.outputs.summary }}
    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions
            scripts/pr-complexity
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}

      - name: Setup pnpm and node
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: false
          package-manager-cache: false
          version: '10'

      - name: Install dependencies
        run: pnpm install --ignore-workspace --ignore-scripts
        working-directory: scripts/pr-complexity

      - name: Score PR complexity
        id: complexity
        run: npx tsx index.ts
        working-directory: scripts/pr-complexity
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}

  summarize:
    needs:
      - issue-link-nudge
      - complexity
    if: ${{ always() && github.repository == 'mastra-ai/mastra' && github.event_name == 'pull_request_target' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions
            scripts/pr-automation-comment
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}

      - name: Setup pnpm and node
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: false
          package-manager-cache: false
          version: '10'

      - name: Install dependencies
        run: pnpm install --ignore-workspace --ignore-scripts
        working-directory: scripts/pr-automation-comment

      - name: Upsert PR automation comment
        run: npx tsx index.ts
        working-directory: scripts/pr-automation-comment
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_SUMMARY: ${{ needs['issue-link-nudge'].outputs.summary }}
          COMPLEXITY_SUMMARY: ${{ needs.complexity.outputs.summary }}

  close-stale-unlinked:
    if: ${{ github.repository == 'mastra-ai/mastra' && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions
            scripts/pr-issue-link
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}

      - name: Setup pnpm and node
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: false
          package-manager-cache: false
          version: '10'

      - name: Install dependencies
        run: pnpm install --ignore-workspace --ignore-scripts
        working-directory: scripts/pr-issue-link

      - name: Close stale PRs without linked issues
        run: npx tsx index.ts
        working-directory: scripts/pr-issue-link
        env:
          MODE: close-stale
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          STALE_DAYS: ${{ vars.PR_NEEDS_ISSUE_STALE_DAYS || '1' }}
