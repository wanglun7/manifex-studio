name: Changed Test Gate Labeler

on:
  workflow_run:
    workflows:
      - Changed Test Gate
    types:
      - completed

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  label:
    if: ${{ github.repository == 'mastra-ai/mastra' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0].number != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions
            scripts/pr-test-gate
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}

      - name: Setup pnpm and node
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: false
          package-manager-cache: false
          version: '10'

      - name: Install dependencies
        run: pnpm install --ignore-workspace --ignore-scripts
        working-directory: scripts/pr-test-gate

      - name: Label changed test result
        run: npx tsx index.ts
        working-directory: scripts/pr-test-gate
        env:
          PHASE: label
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          TEST_RESULT: ${{ github.event.workflow_run.conclusion }}
